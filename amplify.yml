version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm i

    build:
      commands:
        - echo "NEXTAUTH_URL=$NEXTAUTH_URL" >> .env.local
        - echo "RESEND_API_KEY=$RESEND_API_KEY" >> .env.local
        - echo "MONGO_URI=$MONGO_URI" >> .env.local
        - echo "CONTACT_EMAIL=$CONTACT_EMAIL" >> .env.local
        - echo "ADMIN_SECRET=$ADMIN_SECRET" >> .env.local
        - echo "GITHUB_TOKEN=$GITHUB_TOKEN" >> .env.local
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
